<!DOCTYPE html>
<html>
<head>
    <title>Aquarium Simulator 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #001e36; }
        
        #ui { 
            position: absolute; top: 20px; left: 20px; color: white; 
            font-family: 'Segoe UI', sans-serif; pointer-events: none; 
            text-shadow: 1px 1px 2px black; z-index: 10;
        }
        
        #start-screen, #game-over-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 30, 54, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        .input-group { margin: 15px 0; text-align: center; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 18px; }
        #time-input {
            padding: 10px; font-size: 20px; border-radius: 8px;
            border: 2px solid #00aaff; width: 100px; text-align: center;
            background: rgba(255,255,255,0.9); color: #333;
        }
        
        #start-btn {
            margin-top: 20px; padding: 15px 40px; font-size: 24px;
            background-color: #00aaff; color: white; border: none;
            border-radius: 50px; cursor: pointer; box-shadow: 0 0 15px #00aaff;
        }
        
        #start-btn:hover { transform: scale(1.1); background-color: #0088cc; }

        #game-over-screen { display: none; background: rgba(0, 0, 0, 0.8); }
    </style>
</head>

<body>
    <div id="ui">
        <h1>Aquarium Poin: <span id="score">0</span></h1>
        <p>1. Klik/Select ikan. 2. Arrow Keys : Gerak. 3. Drag & Drop : Pindah.</p>
        <p style="font-size: 12px; color: #ccc;">Abaikan Hover : Geser Mouse ke atas ikan</p>
        <h2 id="timer-display" style="color: yellow;">Waktu: -- detik</h2>
    </div>

    <div id="start-screen">
        <h1>Selamat Datang di Akuarium</h1>
        <div class="input-group">
            <label for="time-input">Masukkan Waktu (Detik):</label>
            <input type="number" id="time-input" value="60" min="10" max="300">
        </div>
        <button id="start-btn">MULAI</button>
    </div>

    <div id="game-over-screen">
        <h1>Waktu Habis!</h1>
        <h2>Skor Akhir: <span id="final-score">0</span></h2>
        <button id="start-btn" onclick="location.reload()">Main Lagi</button>
    </div>

    <!-- Import Map untuk dependency Three.js -->
    <script type="importmap">
        { 
            "imports": { 
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "./fish-model.js": "./fish3d.obj"
            } 
        }
    </script>

    <script type="module" src="./game.js"></script>
</body>
</html>
