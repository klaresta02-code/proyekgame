<!DOCTYPE html>
<html>
<head>
    <title>Aquarium Simulator 3D</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #001e36; 
            touch-action: none; /* Mencegah zoom saattouch */
        }
        
        #ui { 
            position: absolute; top: 20px; left: 20px; color: white; 
            font-family: 'Segoe UI', sans-serif; pointer-events: none; 
            text-shadow: 1px 1px 2px black; z-index: 10;
        }
        
        #start-screen, #game-over-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 30, 54, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        .input-group { margin: 15px 0; text-align: center; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 18px; }
        #time-input {
            padding: 10px; font-size: 20px; border-radius: 8px;
            border: 2px solid #00aaff; width: 100px; text-align: center;
            background: rgba(255,255,255,0.9); color: #333;
        }
        
        #start-btn {
            margin-top: 20px; padding: 15px 40px; font-size: 24px;
            background-color: #00aaff; color: white; border: none;
            border-radius: 50px; cursor: pointer; box-shadow: 0 0 15px #00aaff;
        }
        
        #start-btn:hover { transform: scale(1.1); background-color: #0088cc; }

        #game-over-screen { display: none; background: rgba(0, 0, 0, 0.8); }

        /* === ON-SCREEN CONTROLS === */
        #controls {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 15;
            display: none; /* Hanya muncul saat game mulai */
        }

        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
        }

        .ctrl-btn {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: white;
            user-select: none;
            -webkit-user-select: none;
            cursor: pointer;
            transition: background 0.1s;
        }

        .ctrl-btn:active, .ctrl-btn.active {
            background: rgba(0, 170, 255, 0.6);
            transform: scale(0.95);
        }

        /* Posisi tombol panah */
        .btn-up    { grid-column: 2; grid-row: 1; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 3; }
        .btn-right { grid-column: 3; grid-row: 2; }

    </style>
</head>

<body>
    <div id="ui">
        <h1>Aquarium Poin: <span id="score">0</span></h1>
        <p>1. Klik/Select ikan. 2. Arrow Keys / Tombol di layar. 3. Drag & Drop.</p>
        <p>Game Made by restalowe_19.02</p>
        <h2 id="timer-display" style="color: yellow;">Waktu: -- detik</h2>
    </div>

    <div id="start-screen">
        <h1>Selamat Datang di Akuarium</h1>
        <div class="input-group">
            <label for="time-input">Masukkan Waktu (Detik):</label>
            <input type="number" id="time-input" value="60" min="10" max="300">
        </div>
        <button id="start-btn">MULAI</button>
    </div>

    <div id="game-over-screen">
        <h1>Waktu Habis!</h1>
        <h2>Skor Akhir: <span id="final-score">0</span></h2>
        <button id="start-btn" onclick="location.reload()">Main Lagi</button>
    </div>

    <!-- ON-SCREEN CONTROLS -->
    <div id="controls">
        <div class="d-pad">
            <div class="ctrl-btn btn-up" data-key="ArrowUp">↑</div>
            <div class="ctrl-btn btn-left" data-key="ArrowLeft">←</div>
            <div class="ctrl-btn btn-down" data-key="ArrowDown">↓</div>
            <div class="ctrl-btn btn-right" data-key="ArrowRight">→</div>
        </div>
    </div>

    <script type="importmap">
        { 
            "imports": { 
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            } 
        }
    </script>

    <script type="module" src="./game.js"></script>
</body>
</html>>
